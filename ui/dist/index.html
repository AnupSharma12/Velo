<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="logo">V</span>
        <span class="brand-name">Velo</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-view="search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>Search</span>
        </button>
        <button class="nav-item" data-view="library">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>Library</span>
        </button>
      </nav>
      <div class="sidebar-playlists">
        <h3 class="section-title">Playlists</h3>
        <ul class="playlist-list">
          <li class="playlist-item">Liked Songs</li>
          <li class="playlist-item">Recently Played</li>
          <li class="playlist-item">Chill Mix</li>
        </ul>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-nav">
          <button class="topbar-btn" id="btn-back" aria-label="Back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="topbar-btn" id="btn-forward" aria-label="Forward">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="topbar-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" placeholder="Search tracks, artists, albums…" />
        </div>
      </header>

      <section class="content" id="content-area">
        <!-- Hero / Now Playing Area -->
        <div class="hero" id="hero">
          <div class="hero-art">
            <div class="album-art-placeholder" id="hero-album-art">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
          </div>
          <div class="hero-info">
            <span class="hero-label">NOW PLAYING</span>
            <h1 class="hero-title" id="hero-title">No Track Selected</h1>
            <p class="hero-artist" id="hero-artist">Browse or search to get started</p>
            <div class="hero-meta" id="hero-meta"></div>
          </div>
        </div>

        <!-- Track List -->
        <div class="tracklist">
          <div class="tracklist-header">
            <span class="col-num">#</span>
            <span class="col-title">Title</span>
            <span class="col-artist">Artist</span>
            <span class="col-album">Album</span>
            <span class="col-duration">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </span>
          </div>
          <div class="tracklist-body" id="tracklist-body">
            <div class="tracklist-empty">
              <p>No tracks loaded. Drag &amp; drop files or folders here.</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Player Bar -->
    <footer class="player-bar">
      <div class="player-track">
        <div class="player-art-small" id="player-album-art">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="player-track-info">
          <span class="player-title" id="player-title">—</span>
          <span class="player-artist" id="player-artist">—</span>
        </div>
      </div>

      <div class="player-controls">
        <div class="player-buttons">
          <button class="ctrl-btn" id="btn-shuffle" aria-label="Shuffle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-prev" aria-label="Previous">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button class="ctrl-btn ctrl-play" id="btn-play" aria-label="Play">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-next" aria-label="Next">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-repeat" aria-label="Repeat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>
        <div class="player-progress">
          <span class="time-current">0:00</span>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span class="time-total">0:00</span>
        </div>
      </div>

      <div class="player-extra">
        <button class="ctrl-btn" id="btn-queue" aria-label="Queue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <div class="volume-control">
          <button class="ctrl-btn" id="btn-volume" aria-label="Volume">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <div class="volume-bar">
            <div class="volume-fill" id="volume-fill" style="width:70%"></div>
          </div>
        </div>
      </div>
    </footer>

  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
