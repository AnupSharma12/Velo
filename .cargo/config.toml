# Cross-platform build aliases
# Usage: cargo build-win, cargo build-linux, etc.

[alias]
build-win     = "build --target x86_64-pc-windows-msvc"
build-linux   = "build --target x86_64-unknown-linux-gnu"
build-macos   = "build --target x86_64-apple-darwin"
build-macos-arm = "build --target aarch64-apple-darwin"
build-wasm    = "build --target wasm32-unknown-unknown"
build-all     = ["build-win", "build-linux", "build-macos", "build-macos-arm", "build-wasm"]
